body:
  text: 易齋集卷下明劉璟撰序紫芝山房詩序詩附可以仕可以隱聖人之事君子之當務也君子之心豈不欲揚於王庭使仁義孚乎上膏澤被於下哉隱者蓋不得已也或其時之未至則韜光育德以俟善價所以從容仁義必有其道似不汲汲以求售也今工部尚書鄭公未遇之時居閩之建寧築室於芝山之下因名曰紫芝山房若終身焉他日以選舉繇泮庠登進士第授監察御史以清慎見稱出佐藩閫劇務理而民賴以安繇是知其藴積之厚見於行事不露聲色而各得其要也曩者見公於館囑余為詩嘗為之而不工未敢以獻也後數見公於京而匆匆不及言余將以為任大責重縈挂思慮有不屑於此也近公以事來中都豫以臥疾弗克迎謁僚佐盧廷綱來道公意仍以索詩為言又知公之未嘗一日忘其所謂紫芝山房者豈非以其舊日道義之積源委於是見於今者乃其用也芝太平之祥也王者德及昆蟲草木則芝草生故四皓茹芝於商山今聖天子在上公之遭遇豈四皓可與同日語哉既序其略復系之以詩曰閩中盛陽和隆冬若初春所以紫芝山秀氣常氤氲禎祥有餘滋生賢如甫申築室山之中芝生鬱輪囷讀書慕古道入仕非為身要將聖賢意淑此當世人一麾守雄藩已見康斯民於今贊帝工任重事愈殷况當旰食秋忠心益勞勤藝事陳逺猷黼黻昭三辰濟濟進殳斨弼哉善人鄰於焉歸舊居猿鶴迎鑣輪洋洋紫芝歌永久鐫蒼珉送盧奉祠還天台省母序詩不云乎有馮有翼有孝有德蓋王者擇臣必求孝而有德之人置諸左右養其仁厚之心消其邪僻之志於以感格神祗臨長衆庶承天休而儀表於四方也府屬盧公廷綱天台人初以茂材達於天官授府奉祠蒞官供職淡於勢利樂詩書而好文學頃刻不自暇故詞翰尤精粹有母居故鄉年且邁欲與致就養其伯氏以道逺弗忍捨故不克遂其志每念之未嘗不嗚咽流涕心神飛馳也久之王知其為人乃試以事觀其設施每出人意表內外皆賢之旦夕侍講幃幄出入惟謹暇日與余語恐其親一旦有不可諱則抱終身之戚雖欲竭力所事其如方寸亂何或不幸而涉於此雖人不我棄我則棄於人矣其若之何乃以情告於王王憐而許之使歸省其親而復來戒車馬有日矣僚友榮而祖之為歌詩請余為序余惟人之患在於無德無德莫大於不孝孝德備而才器稱之君子哉然後逹于王庭取其有諸已者施於事則義禮具而時務諧矣夫人之於孝猶水木之本源也豐其本則枝榮淵其源則流滋人篤於孝則立身修交友信居家理為邦治上而君王下而百執事暨於民庶舍是則無以為人故聖明之主雖內行無歉乃不自滿假必求孝德之人以為輔翼交修不怠治於已者愈嚴則化於人者愈廣孝道孚而天下平矣若廷綱之才美篤志孝慈於此行見之今以榮歸故鄉登堂拜母親友畢集錦衣晝里為人子若此又何拘拘膝下而為孝耶廷綱勉之事親如曽子作人如周公古人以為可耳不其難乎願無足其所已能致力於內而不務於外猶長日加益而人不覺其所以然者異日馮翼之功著於邦家孝德之歌被於絃誦則吾不觖所望而為知言矣送鄭子英知龍泉縣考滿復任序漢民之歌曰載其清靜民以寧一豫嘗欲於時輩中求識此議者與講明之未得其人也吾栝有屬邑曰龍泉世傳以為歐冶鑄劍之所因以得名其山川秀麗人多智能治得其道則易不得其道則難雖然豈其一邑獨然哉為其邑以最全者雖不乏人以殿黜者亦夥常詢其故而方之猶登太行駛巫峽車堅馬強舟楫完固者則若履康莊泛安流也利劍之遇盤錯人才之理難事亦繇是也曩余因告歸展省其邑人有過我者曰吾邑之尹曰鄭子英甫河南鄢陵人也蒞政已二載許常以亷靜奉身以簡當馭事期會集而公務理吏不能有所擾他無所作為而民得息肩訟庭省譁聒如牛馬走輩皆沛然遂其樂生之心其聖天子之德與抑亦尹之能與應之曰天子之德實然尹蓋深知聖意能奉宣而得其道之要者也客去吾固願見尹而不可得今至京師尹上計考於天官稱職復任謁告歸故里省二親與會於葉廷鎮之寓軒觀其儀止敦厚因問之曰尹以何事治民而得譽若是乃遜詞無所答固問之對曰民本無事僕安得有事焉余益有感於衷乃作而言曰善夫無事之能安民也是知理者必以無事為主則欲不見而心不妄動簡以馭繁誠以服人斯其物也使有民社者皆如是民其有不安者乎漢民之歌信不誣矣夫興禮樂致雍熙亦必自清靜無事始惜乎漢之不能𢎞闡之於前也尹尚加懋之哉使一邑為衆邑式以副聖天子視民如傷之盛心願莫大焉坐皆稱善廷鎮暨某等遂請次其言以為尹贈且為他日考績崇秩之張本也送羅公任歸省序丈夫處世不仕無義仕而豈能人人遭際竒遇如虞卿范雎之於秦趙公孫𢎞朱買臣馬周輩之於漢唐者哉故必積功纍年勤勞久逺以漸而升者乃常事也或時之未至則屈於抱關委吏者往往有之然有志之士恆修其在我不以崇卑貧富易吾操也羅公任氏世為江西南昌人力家事餘暇讀聖賢書事父母盡愛敬因其家有園池之樂凡故人親友必極力招致以娛悅之使父母不覺其勞如古人所云者與其兄居友于尤篤家道睦於內誠信著於外其州里朋友者無異辭繇生員赴京師以其聰明見知天官留試簿書於是修已愈益慎奉公愈益勤歷三年無滯事考功以最稱視其才固綽然有餘也行將超擢矣乃葸然念其親之在故鄉定省踈曠泣而請於所司意以為奉親之日有限報國之心無窮也得告以歸戒舟楫有期矣僚友諸彥咸惜其别為詠歌篇章道情思進針益以壯其行余同邑葉廷鎮氏以相從之久為禮義交尤稔來請余序其端余惟仕則慕君既仕矣而能慕父母者古人所難况當進超名利之際乎惟其中有所守故不以造次變遷必盡夫天理人情之至者而不茍焉耳公任年方將學日廣意其他日所成就不止於此蓋求忠臣於孝子之門者古今之通誼也尚其朂哉竹隱集序隱以竹名取其節也虛中修幹柔枝翠葉歷霜雪而不悴竟歲寒而晚凋與松柏同其操非有節能如是乎炎蒸鬱隆溫風如烘入竹而清且涼如善之化不善忘其初之謂狂節之時用大矣哉士有飢不得而食寒不得而衣蒲輪束帛輿馬隘閭巷節使趨門庭衒之以千金之賜懷之以通侯之印寧死而不為屈壯哉節乎隱者慕之推而達之見用於朝廷安人濟衆托孤寄逺臨危制變惟義所通而不可奪出處雖殊其為節一也士君子立身行道不見知於人而不求人之知間居獨善乃取則於物之無情可以寓吾理者而不於人乎取之抑為輕世歟非歟抑有得於心之適歟抑可比德而尚友之歟徐生仲成結屋於鶴山之巔樹竹環四圍誦詩讀書於其中以淑其身而不求人之知蓋尚友於節也又以平日所得於心之適者形諸咏歌名曰竹隱集故為之序以朂其志生其勉之延慶堂後序君子之長國家者必周於天人之理積善埀訓致其福於後昆也人之智愚不同而欲其子孫福胙祭祀不輟則同也君子知其然故立身也正事君也忠養民也惠使民也義不為衒耀表暴致飾於外必恭謹省察積集於內不獨善其身必著其嘉言善行以為後進法善裕而福延於子孫則謂之餘慶慶者賀也故君子積善而受福人心悅之而以為賀知人心之同於善也君子必因心之善以合乎天之理故天錫之福而人悅之所謂同於天人者也君子長國家者務此道也小人反是故君子積善埀訓可繼者巳也後人能嗣守不輟者天也君子之子孫象賢而受福者慶也人之心以為善也喜其善之及人可以為賀也小人或得福幸也幸難繼也人之心不以為善也莫可為法以及人奚可賀也君子必積善而受之以正合乎天理人心之所同是以澤流子孫可以為法可繼而久也豈不可賀也耶豫讀前春坊汪先生延慶堂記及其命名之意知積善餘慶之驗也徽之績溪汪氏自唐越國公諱華者始盛至宋諱某者仕為御史大夫纍代文物相承積善力行本支甚繁衍也今幾世孫彥忠又孜孜於善求言講學慎擇之不怠富而好德居鄉里處宗族以善自安必將永於後也春坊之名其堂也實稱其文意敦雅惓惓於善而歸於誠服其言蓋所以延慶之物也遼府殿下賜詩以美之趣尚深逺期以永久未易以片言幅紙頌而盡也若夫汪氏自越國而下為世凡幾十為年凡幾百纍世為善出處之迹必有版載惜乎余不得而詳覩也紀善程某過余求言以廣其意讓不克乃為序於後而系之以詩曰積善成名其慶繩繩君子之孫厥德有馨富而能謙惟善是承古訓是稱格言是徴允矣春坊博哉其言事物之理孰為善先洵美仁王樂善推善與人為善己實有焉汪氏之孫越國之裔學問進修用永厥世擇善思誠春坊之訓受而實之天人斯順仁王之詩詩禮昭昭拜嘉服膺延慶遙遙奕奕龍山迢迢黟溪君子之孫忠孝是躋仁以為家義以為蹊積止不息仰止以齊肅肅君子邦家之幹秩秩大猷斯屏斯翰朂是後昆善以為冠善以為慶於赫有燦傳狂夫傳狂夫者不知何許人也性不羈好讀書放浪山水與好事者縱飲忘形大言造玄奧雖有識之士亦不能窺其淺深常時與人交則諄諄見誠實言行相顧能隂陽地理之術其取用與時輩不同驗於休咎昭昭在人耳目間豈所謂狂者與他日從豫遊有執易以問者曰先生善易者也因發卷得艮卦曰艮其背不獲其身行其庭不見其人先生以為何如乃率為之言皆不蹈常襲故而洞契不言之妙或以為神授先生遂直以此自任人皆謂之狂夫乃怡然受之曰此固善名我者也乃益肆其狂常坦腹跳呌曰古之狂也直吾豈愧於古人耶兊合不以談希言順鴻濛耳目口三寶固塞勿發通是豈知道者哉吾固發之夫天地鬼神之祕不可得而言亦不可不言也使皆不言則小子何述焉人有就之者輒避去不交語或不意扣之則又極言無隱雖皆知其為有道之士然卒莫能得其要領因以狂夫著其名或言狂夫天台人姓王氏浪迹甌栝間狂夫不為人言竟不知其果然否也贊曰楚接輿之流尚矣如狂夫者其遺世絶俗而為之者與樂緩齋記世之緩者非一途人皆目之以迂衆人非之而不易其所操者其自得者與其見利不惑者與客有好古博雅褒衣峩冠趨中律吕言法典謨非樂不作非禮不居射利後時屢空晏如人皆以為不足而巳獨謂之有餘常據緩而自樂揭齋顔而特書誠不能疾行而爭先甘後塵以徐徐以安處而忘勢以緩步而當車他日豢龍先生連軒結駟騶從繁夥過其門而式焉客方晝寢聞先生至起而求衣乃襪乃屨乃紳乃冠舒舒出而見焉豢龍氏之從者愠而言曰夫子遊海內歷國都上者君王次卿大夫未嘗不折節擁書執羈先驅誠尊夫子之德義甘至道之雋腴今彼何人獨處窮廬謀不足以經國智不足以耀軀而夫子乃徘徊按節若有求於彼者何歟蒙竊惑焉豢龍先生拂袖而笑曰若所謂寶珠玉之潤澤而不知菽粟之可以充飢而引齡也若徒見吾之榮榮曄曄豈能潔其百得而不足以償一失哉若客之道所謂日月計之不足歲月延之有餘豈若之所及也耶客姓錢氏字尹仁以樂緩名者其齋居也為之記者谷府長史劉仲璟也蒙泉生記山下出泉靜而清人性之理其猶是乎錢生貴善自名曰蒙泉生豫訊之曰蒙以養正聖功也今子名是其亦有志於聖學乎生曰走也有志先生悉之乎否也豫曰子既名其名而不悉其義徒為園之檀乎其將以觀美而炫外乎生曰走侍公非一日非信宿矣竊慕髙誼故惓惓以請益也走蒙也蒙蔽昧不通之象也夫易之蒙山下出泉泉為山所蒙而不能自達猶人為欲所蔽而不能自克聖人導之以道用刑人脫桎梏而底諸道焉功用大矣哉豫聞生之言知其有所發也危坐不應生亦頴悟遂拱手再拜徐趨而出過石頭城下登江東之橋縱目極覽觀波濤浩瀚之勢恍然而返曰泉之所出豈山能蒙之哉僕受教多矣豫嘉其志遂為書之玩雪軒記人以血氣食色之軀不能無情繇是而玩好嗜欲不能絶亦其宜也昧者縱欲貪飫侈靡放逸惟情之殉而不知止乃有以其所欲喪其所以欲者不思甚也惟君子為能約之故取寄於清淡無情之物以為玩好久則情與習一私欲消而天理純矣孔子曰仁者樂山智者樂水後之君子有以愛蓮愛菊愛梅或取夫山川草木日月風雲之所感遇得其蕭散髙致忘寵辱去係吝者於以寓言玩好亦將冀其與居之久而吾之情與彼同也夫會稽張生康名其居之軒曰玩雪求豫記之余聞物之清爽潔白者莫如雪溫氣迫於寒而不能散為寒所凝而為雪故雪之時初溫而後極寒人之玩之未嘗不毛髮森竦肅然無褻狎意其似乎君子之亷介儼恪可交而不瀆者與宜生之深玩而得其意也或曰雪之物嚴沍栗烈當隆冬之時隘川塞途使人不得和顔色而居處昔人氷山之諭以為知言豈君子之類也夫豫應之曰天地順運四時行焉寒暑節至故和氣應而品物成寒雪之不可無於冬猶暑雨之不可無於夏也且賦詩斷章采葑菲者不遺下體吾取其清潔肅爽而己又嘗觀夫至日閉關商旅不行朔風起寒彤雲蔽空於是乎霰雪交零不終朝而宇宙一色光耀瑩潔王公大人與士君子之處溫室廣厦者重裘毳幕爇椒熾獸薦肥酌美烹茶賦詩豈不麗且清哉其亦有念於蓬廬鶉褐之士與征戍轉輸之人乎張氏父子皆樂善博愛吾恐其於玩雪之際此念一驚於心耳得不撓其興耶姑又附於孟氏雪宫之末論云張氏以忠貞文學為越世家先輩及今名達士譜載甚詳悉兹不述特記玩雪之一事耳生善畫梅華深得飯牛翁家法梅之花與雪同一時其取類皆清潔者也願學齋記傳曰不學將落言人學當及時不可遊衍同其遲暮而落也願學乃公西赤對夫子之語蓋謙退不敢遽為己任者夫子之誨人曰敏而好學學所以求仁也又曰當仁不讓於師嘗以冉求退又勵之曰今汝畫皆盡言學之不可後於人也若是本府紀善會稽張宜中名其從孫錬讀書之齋曰願學或曰將勉之為學乃先為謙退以抑其心無乃怠乎宜中喟然歎曰行或同轍而異途言或同文而異義吾豈不見夫所謂學士大夫之徒者與大言廣論則曰舜何人也豫何人也髙尚其志固將驅駕前哲而凌躐當時者矣然考其踐履真實成就果何如哉吾姑遜其志使就於學非使固執謙退以怠也語曰學如不及猶恐失之使夫志願於是豈不可哉余善其言益嘉其能訓子弟之得其宜也嘗讀周書至於世祿之家鮮克由禮以蕩凌德實悖天道蓋撫卷而三嘆傷教道不幸也世祿王者眷念前人忠勛恤其後嗣資之以稽古崇德而象賢者也至於愚騃不肖之續將以丹書鐵劵閥閲門第如天置地設之不可移者幼則驕惰長則放肆傷敗禮法以至悖於天道而不可救豈其生之不幸歟其法家拂士父兄之非其人歟抑其居之使然狃於富貴驕淫之習而教不能入歟三者一居於此則淪胥亡矣是以喬木少而故家者難得也今觀張氏以守臣死事之家世祿前代居於越者僅八百年本支繁衍文行名達之士不乏於時吾今所與遊者宜中與其二子及從孫為世者三輩皆儒雅周慎迹其往之膴仕可推而知後之來者固可踵而繼也其故何哉良由長者能教幼者服膺以聽相延為習者也嗟夫世道靡弊子弟之不聽於父兄也久矣若宜中之能以遜讓之訓挫夫少年英鋭躐進之氣為子弟若鍊者拳拳於長者之教必克繇禮而不至於蕩也所願學者莫切於是詩曰此令兄弟綽綽有裕家道之綿長也宜哉又將可為後進法頤齋記頤之象曰天地養萬物聖人養賢以及萬民知天地生物必有所養也而天地為大聖人之理萬民亦必有所養也而養賢為大養之得賢則心腹耳目股肱皆良於以建皇極立綱常明禮教仁義行而恩澤洽使民得其養而安且久也大哉養乎天地之設施聖賢之教育民物之豐植無非雨露之所滋益而庶彚賴以成者也然則聖賢之所自養以其大者亦必以其道乎曰誠其心一其志寢興無怠食息必謹敬義立而神明存焉善惡辨而職事理焉孟子曰養其大者為大人傳曰能者養之以福此之謂也王均輔氏築室鶴溪之北環以羣山帶以流水繚以周牆蔭以松竹讀書樂道於其中夫所謂與物無恙與人無爭而卒以全身逺害者必養之得其正守之得其道行之得其宜也均輔之伯父名謙字益友從永嘉鄭如心先生學軒岐書得承制配合之術尤精徹或羣其藥物或集其溫良以平時氣以扶天和為人愈疾患與平居所以致無疾者節宣適中疾徐合宜雖以數月獲安為功亦不踰時濡滯以混厥標本也與人交遊無少長貴賤皆接之以誠實臨利害處危難未嘗便已以陷人人以是益親之享年九十有一常康健若少壯者比終惺惺然不改常度交遊鄰里之人皆若喪其親愛又以知其平日養己養人各得其道也均輔能世其業尤為鄉里所推擇與其子侄若孫同居以手指計者凡二百許雍穆如一日里之居百餘家父子相繼自本朝以來四十餘年未嘗有間言其所與遊者又皆以禮義相敬愛不以炎涼氣焰為踈數也先君誠意伯常善益友先生之醫而嘉其有守有禮貌焉嘗謂之曰處心平善以居鄉里宜其康寧而壽也先兄參政府君暨余與均輔交遊甚善嘗過其居覽山水之秀笑談徜徉於其間察其人敦厚周慎安於義命又深得夫養生之道與所以推巳及人者因名之曰頤齋石樓黃先生已為之記矣今豫以疾蒙恩歸於故園均輔復請余志之因述其詳且欲請其養之之道以起豫之沉疴也雙溪漁者記客有居於栝之雲陽東阜以雙溪漁者自名暇日則持竿揭絲釣於澗阿歌曰溪之水兮悠悠黿鼉不驚兮蛟龍不遊逝者如斯夫孰為汝留聊舒情兮優遊芳餌兮埀鈎魚不食兮非吾求與其負重任而顛沛兮寧踽踽涼涼而無憂或問之曰子居非雙溪而以其名得非慕沈僕射為人乎客曰吾不忘吾宗耳又曰子非以漁為利者而以漁名得非時之不足子所乎客遂掩耳而走他日有以其事語余者余甚異之訪而得其人焉沈其姓㻑其名廷藴其字也善一行禪師琴堂星命之術為人究災福所以趨吉避凶者言率多驗其迹雖脫略而行止尤謹厚其所藴藉固未止於此因記所聞見如是者并志歲月云全生堂記今年秋余臥疾中都醫士郭原奉王命來視服其藥旬日而愈醫能順時氣為理亦善矣暇日以其家乘及行狀示余蓋上世仕宋居官蒞政皆有功於時挂簪組者凡三人始居天台後遷於杭原居杭又五世以仕門子孫業醫名其堂曰全生趙公仲穆為之書扁其名通於士大夫間德可知矣醫以全人之生為心其仁者之徒與或曰有生必有死醫焉能全之其誑也耶應之曰生之盡其壽而死是謂天理之常雖天莫能全之况於人乎其札瘥暴橫藥之則生不藥則死以其藥之而生名曰全生亦不謬也風寒暑濕之中於人或客忤昏眩顛仆暴絶應與劑而起者有矣尸厥亡陽施砭尉而復者有矣出入起居時氣克害羸形伐性虛損勞弊藥石可以理之婦人血氣孩嬰疳疹或失其經或瘡或積藥石可以痊之凡病之危篤而天期未盡者皆可以藥石延之使逮當盡之期是全之以致於此時也夫自其期之盡者觀之以為不全雖天地非全物也自其未盡之中或能引而延其歲月姑謂之全亦可也功業成器者莫不如是非知道者孰能識之原之為人安詳淑願今以醫道參侍王門衆稱勤謹暇日發其所學以全人之生而札瘥暴橫賴不僵殞者亦多矣會稽張宜中氏復以籕古全仁二字貽之與人為善之心也吾聞仁者好生而原能全之固有先得其心與同然者也吾王甚好仁又喜原之得所依歸將見其所全之生日廣而仁不可勝用也其名聲又昭著於永久也是為記榕湖軒記榕樹生閩廣間葉隂濃而來髙風南方之宜木也其近水者尤茂張彥通氏名其讀書之室曰榕湖軒求記於余按湖在閩之三山郡侯官縣三沙鄉西南連大江通潮汐泛舟江之滸則有白沙驛玉溪亭在焉雞輿五峙雙桂三峰峙其東北居是軒者攬山水之佳致搜經籍之芻豢存心養性將以探造化之祕賾躡聖賢之髙蹤又豈直輕富貴忘利達而已哉彥通之言曰吾之居是軒也安吾身儼如也存吾心一如也讀吾書以求綱常之實行不務誇靡以矯揉也遊目於山川平旦之氣得其助者為多而榕之蔭吾軒冬無嚴風夏無歊鬱湖之波光蕩漾涵映日月有自然之趣難以名狀因名曰榕湖軒豫謝之曰子之言善矣無以加矣抑頌子而勉焉可乎人之為軒館者以玩賞而讀書者以文詞子之軒乃知安心而存心讀書而務實覽山川之秀而挹其平旦之清所以拔於流俗者亦多矣然而詩曰靡不有初鮮克有終尚期終之無怠敬之無失使榕湖之佳致與吾心同為融化不其美乎因不辭而書之恆睦堂記栝有世家曰項氏居龍泉縣之安仁鄉自唐以來奕世相繼若千年矣至諱闕字子永號恕翁者又以讀書德行為族白眉常名其堂曰恆睦所以崇友于厚骨肉示悠久而不廢者也因廣其義以伏臘之餘貯穀若干石以周鄰里之急歲斂其出之數而不取其息負不償者因以俾之來歲不復貸如此者數十年里人皆便之恕翁之孫佐介余同邑葉廷鎮來求記其事豫時適讀竇禹鈞傳乃慨然嘆曰姬周以降民失井田能自振無缺者幾何况能推其羡以恤人之不足者乎其輕財任俠為豪舉者又非君子之道也若項氏以儒起家而躋膴仕或以儒而醫能存心於愛物觀其宗族譜系可見及其名堂之意將俾子孫肅雍永睦悠久不怠可謂有物有則者矣佐字祐民為人警敏而能讓又能闡承祖志知必能大其後也詩曰子子孫孫勿替引之其必繇禮義之途而加懋也恬淡軒記距栝城東南十五里所倚好溪之南有勝地曰少微真境有宫殿樓閣以祠禮元始祖氣昊天上帝神仙百神有軒館室廬以居黃冠之士顔曰紫虛觀因山水秀潔飾以金碧形勢壯麗光耀交輝造其境者莫不翩然有憑虛御風之想也前人蓋多記之昔章思亷徐泰定為道士時能致鍾呂與之同遊竟以仙去其地之靈勝而人得以為助者從可知焉豫少侍先君子遊其所交當時羽士之衆殆百許人少長秩秩皆瀟灑絶塵理初陳君年二十餘善小楷書習道業甚勤不接世俗事尤為先君所稱賞曰此子世味淡薄其從吾與赤松子遊者也遂與俱入山徜徉林壑者久之理初為人和易莊重淵默平居淡然踐履真實而不泥於物即其所居在金闕寥陽寶殿之東南隅名曰恬淡軒蓋深得老氏沖漠恬淡之旨故行之専而守之一也火候之暇則鼓琴浩歌太虛曠朗之中觀造化之運與日月之行若野馬經目况於髙軒廣厦珍羞美服與夫世人之所趨慕而以為得志者之為哉昔人所謂以道事天地天地猶一物也他可樂見非道在我者安能得其審耶余聞河上公善老氏學其徒蓋公以清淨之道淑諸蕭曹漢文帝恬淡寡欲幾致刑措民受其賜凡數百年猶水火飢渴之得飲食而濟之以溫涼不其大哉商周以後治道之所推讓者也他日以語理初曰子今逍遙物外真忘世者或可以其恬淡之要指歸當路使為斯民息肩何長往而不顧也耶理初乃拂桐整絲鼓梅花之操而繼之以離騷適微風度於竹之虛隱隱然若有和之遂相視忘言而出余後馳驅沙漠今以疾告歸理初乃泛槎携琴以過余之易齋其神彩清偉踰於少壯而曠世之度若鴻軒鳯翥於煙霞之表嗟夫俯仰疇昔三十餘年人事變遷不可勝歎而有道之士乃若是神仙果可學耶吾將從理初與太初而為鄰乎書擬代蘇子卿答李少卿書少卿足下無恙幸甚相去萬里逺寄音聲辭旨繾綣意氣哀切何者所出同而所處異也辱書以逺托異國悲心無聊夫風沙朔漠之場秋草蚤衰寒氷慘烈居人猶或厭苦况以國士慷慨羈客遐方屈身穹廬雜處異類又安得不戚戚傷心也哉武初見執時分以肉餧虎狼膏染草野以報漢恩蓋夷齊抱義豫讓報仇茍盡我心豈圖後録不意單于懷漢威靈卒得脫艱難復故國獨拜茂陵於武初計誠已萬幸誰復望爵賞哉少卿提雄師震威武以寡擊衆摧挫強虜其欲報恩於漢心豈殊途然而功烈奮揚武誠不足希其萬一何乃臨變差跌卒實吏議上纍老母下及妻子使明主為少卿含憤交遊為少卿失足武誠懸懸觖望也武聞事君如天恩不敢忘怨不敢報故崇伯被殛神禹嗣興冀芮受誅成子安晉聖人不以為非春秋著之通義所以伍胥未免君子之譏而鬭辛顯賞於楚也先將軍事先帝意少卿承恩陛對時詎嘗念此今日曽可追怨耶蕭樊周魏邂逅一時萬世之後是非自定耳昔荆卿沉七族以謝燕丹之義要離焚妻子而復吳王之仇是以義昭於國士而名著於竹帛人誰不死死且不朽少卿初心有意曹沫之事矣豈不殉要離之義哉夫以少卿才武慷慨當今之時翻然改圖則古人復見於斯先將軍墳墓光輝增耀老母被戮之日猶生之年妻子之恥雪交遊之言信漢朝之君臣顧反躬自慚少卿之義伸矣萬世以下無復遺論况一時刀筆吏哉若長往不返鬼於異域使先人墳墓為叛逆之土隴西桑梓為降人之里漢方有辭少卿永愧矣惓惓逺懷不憚往復惟少卿念之大將軍諸故人意與此同永訣未期佇伺髙誼示姪仕祈書汝今學道此心甚良然以未得要領先除好髙好勝心次屛息諸緣母泛談強辨請略陳愚陋以為何如大概善不繇外來窮理盡性與釋老家言心言性皆繇人性本源虛靈清淨故皆可學而至所謂求則得之舍則失之若使本無從何求之釋老空無之旨謂無形迹言外之意不言之妙非實洞徹安可妄施初入門也須見如何為空如何為無執之泥之都不是有情下種因地果生豈無來厯大忌念頭錯則殊途殊歸自生支節融會不過誤甚矣怕落空怕著相識者詳之若儒者之學則自人倫日用中踏實地行將去須先明諸心知所往虛靈不昧能格物致知物理既明故好惡是非虛實誠偽莫逃其前能盡三綱五常之道子思稱知仁勇知則能辨是非識事理格致之謂也仁則推已及物無所偏倚誠正修必仁能守之推而齊治平不外乎此必勇足以行則知不徒知仁不徒守至誠無息止於至善妙用之至於無聲無臭不能贊一詞矣至易而行難無難在果確勇之謂也古人謂三教將無同名言也以吾觀之子思稱喜怒哀樂未發謂之中老子言清靜虛六祖言菩提自性本自清靜又安可謂不同也若於作用施為處混而觀之只頭面巳不同了何况人倫日用之迹也耶蓋三教並立者繇其知性之本源皆導人為善若諸子百家多有不識性者故難與議道參也竟以魯得之在汝而巳吾故懸懸且中之境畍極難識光風霽月尚猶髣佛故知不在言不知復何言哉到此處所謂本清淨者果何物耶此行俱安好適春光浩蕩風日清麗足使塵慮釋然但一遊一咏皆皇上仁育之至恩也日月如馳報效無績又增慚愧耳汝等在鄉里自宜謹慎避凶趨吉之道固宜盡心也屈子言無滑而魂兮彼將自然一氣孔神兮於中夜存晦翁乃謂雖廣成長生要訣不能外是蓋與夜氣之意合伊川又言常惺惺釋氏言定慧又言不被十二時使却使得十二時動如何是使得十二時請問善知識三月草七日書又示仕祈姪人來得書知汝作畫且通禪甚慰逺望禪者蟬也如蟲脫汚濁之中自致於千章之未呼吸風露世人迹其髙逺可望而不可及也若乃厭清淡而不居則將貽笑於螻蟻矣吾亦觀自古得道之士於君臣父子大倫大節未嘗有欠其明心見性定覺工夫皆是打透死關亦非徒嘐嘐然曰古人而行不掩焉者大抵三教雖不同儒曰窮理盡性以至於命釋曰戒定慧道曰清淨皆是著實工夫方可深造豈泛泛習於陳言乃曰我能此我已覺悟此到臨些子利害便至母取箕帚即生誶語何况生死岸頭灼然劄定眼光無迷無悟使六情不作哉若欲攻儒先盡人事便可達天理達天理則性命道德吾分內也若欲攻釋先去貪嗔則入地光明自然路頭不錯若欲攻道則去執著聲色有無不能沉迷漸入真道若以人生於天地間有三綱五常自然之道莫切近於儒辭章不與焉釋老之道泛然髙逺踈於人事所謂宋徴於人薛徴於鬼是也若明識之士必能洞然要之三教非卓然不屈於物欲難以語道相去逺故叨怛葛藤必為具眼者所嗤笑若見均彰葉先生嘗論之必能發我不及便風更伺報不贅銘針直內齋銘為盧奉祠作內以直外以方齊肅端莊夙夜乎周防敬勝日昌如時雨之􅗈玉珮瓊琚明德孔光君子作針用昭弗忘集義堂銘有記此銘二十年前所作因為記以表之昔蘧伯玉行年六十而六十化吾比於昔僅多文辭耳勉至於化將何時乎姑識歲月云時建文庚辰孟秋之十日書於吳江舟中義欲集集則氣充而神明存焉不欲襲襲則餒而昏矣君子主善以為學而弗怠也善積於躬而弗離也勿以私欲間也禮以節之樂以和之詩書以廣之君子之謂義也無往而弗集也飢食渴飲適吾養也夏葛冬裘順時氣也君君臣臣父父子子兄兄弟弟夫夫婦婦法天常也萬事萬變非義弗為也非義弗繇也非義弗安也萬鍾千駟不驕也簞瓢陋巷不憂也白刃不撓也死生不亂也湛然而中也應於物而用也皆義也道心明而天理全必集之正而存之一也吾以銘吾堂所以勵吾行期無忝於先人也在後之人溫恭朝夕維善之積式昭古昔以引以繹以無餒夫義以裕斯道於無極也耶尚慰吾先人也耶因舊銘而記之銘曰有其名而無其實惟豫之恤知言養氣義以為質集義伊何篤恭孝弟克勤弗墮聖賢是至戒之慎之以永無悔敬齋針為李至剛賦莊其容一其心儼乎其有臨勿顯之欽而昧以淫維豫之針勉焉無息確乎物之莫侵祈祈愔愔如玉如金肅恭神人式昭德音允矣君子福祿攸任頌贊智者寺白描羅漢頌釋典大阿羅漢十六尊者受記佛祖以了末世衆生之所未了故常住不壞其示現神通乃驚俗餘事未可深議也因為頌云大教從來不具文剎那萬劫等浮塵靈光一點無瑕滓靜寂神通總是真徐伯祥像贊體之充氣之雄確乎其有容將以公為遇於時也則未嘗挂簪組乘髙駕駟以展其才器以為不遇也則放浪山水徜徉詩酒不茍售以希合有髙士之風豈非不諧於人而諧於天者耶王伯永先生像贊伯永號懶雲不營時俗之利故名之曰懶有瀟灑絶塵之趨故名之曰雲紹見山之易學實洞貫乎天人載瞻遺像山嶽嶙峋仁者之徒肅諸縉紳敬贊先考誠意伯像虬髯電目探天根兮斡地軸扶龍興雲四方已肅以生民休戚為憂喜以天地晦明為榮辱武功既成而文治未盡其用者蓋天也耶抑人也耶續搜雜著跋富氏族譜余嘗讀宋元老大人事迹見蘇文忠公所製韓國富公碑銘乃古所謂以道事君者歟韓公之言行勛業昭昭然顯於朝廷著於敵國當時蒙其澤矣其嗣續得不昌盛耶南田富氏皆韓分自出譜系至今為昭灼其先有為工部郎中某州刺史諱韜者唐季隱居南田卒葬南華山今無為觀之東峙因名其山曰刺史山此韓公之髙大父也其子諱處謙為內黃令後贈太師封鄧國公居河南遂為河南人逮韓公之孫承務郎僉樞密院事諱直亮宣德郎直清者愛南田山水之佳復歸泉谷其子姓蕃衍因遍擇幽勝之地為别墅今居泉谷語溪之胄皆是也人見其敦尚儒雅守法度有禮讓之士知其必韓之後也有諱㶌字澄川者尤斤斤質厚才德兼稱為鄉邑所推而仲璟富氏之甥也閲富氏之譜諜觀富氏之子孫益知韓公之澤之深且逺也遂書以識其始末云題趙南隱卷鍊師趙南隱氏養真於混元峰下客有好事者為混元真境圖以貽之求豫志其實按師青田人世為仕族好清虛藐富貴學馭風雷役鬼神之術又善卜算往往有驗猶不以為自足復從事卦氣爐鼎鼎奧觀其志直欲洞視萬古與太初為鄰也少嘗遊四方歷覽名勝無能愜其意者惟樂斯地之髙爽又得清溪主者王松澗氏為之依歸使無身外慮得以歲月澄其心神全夫元始正和虛白朗耀者他日道成白日髙舉雖其功行道緣之至抑亦山川清淑之助與松澗成就之力者歟吾嘗讀屈原離騷其逺遊髙舉驂鸞翳鳯逍遙八表下視四極崇髙富貴皆不足以縈其心獨過故鄉必屯車齊駟徘徊興感或至埀涕忍而不能捨也今師逺慕老莊近式鍾吕室廬宇宙輪轅隂陽無官守言責之事與屈子不同何獨惓惓於故鄉之山水耶師好讀書垂老不釋卷其心必有所得難以語俗子者姑書於卷暇日以參同訊之贈塑工夫大慈直指人心見性成佛像教故末法也世人不見不信不形不識舍像何徴焉不為法人無以明證不為像人無以仰瞻法焉像焉兩全無礙以致諸法並行悉無罣礙可也固知如來能離人我衆生壽者一切相也今妙嚴禪寺因兵燹以來蕪廢非一有沙門某者捐捨應身餘資鼎新創造三門大殿及諸廊房既成已後其中空空然無足以聳動人之耳目者乃命善塑者某飾如來佛諸天像莫不儼然如真佛見性鐘鼓梵潮香花幡蓋莊嚴威儀莫不備具令人履其地如遇彌陀佛會遊極樂國此像之不可廢者也傳曰葉公好龍真龍遊庭豈非因形感氣得其應之速耶今浮屠氏以像感靈使人皈仰生敬信心是亦教門之一助也若夫由相以知真因真而離相又非常言常辭所能畢也某今行告歸寺僧咸請余序以送之因書其所繇云書圓覺經後省菴盧居士為道人謝慧定寫圓覺經及其子珏書足成上下卷皆筆法秀潔可愛後跋語云願教法流通尤見深信吾聞盧氏譜出范陽應六祖之族其佛眷屬者耶不然何其儒與釋之道貫也珍重珍重日慧定以經來求語心甚誠切余喜其求未嘗希福德為實有相亦不與時故老輩搏量佛法若慧定者慕達官長者之名而求乎因其専致遂勘慧定本將門子以絶欲不娶勵心精進期證圓覺止所謂廣額屠兒放下屠刀立地成佛不待言語悟也姑示數句倘遇具眼將撫掌大笑曰露出尾巴子也偈曰清淨圓明正修正覺諸多菩薩如來一佛隨方解縛氷化水清本來昭灼復轉一偈曰鐵牛度窗櫺頭尾一齊過浪蕩大虛空免著拖犁擺觀音贊純一無偽千變萬化提籃販魚不𬋩唾罵掗賣不要如何待價老婆心切有甚間話無人售頭空來空罷慈航本無航慈航本無航法眼度衆生云何度衆生援彼離欲海云何為得度能離如是海云何名為欲愚癡及貪愛云何名為海譬喻深如是迷人陷溺之沉滯不能起佛以慈愍故説此無生法斷除諸迷障令彼悉超豁除迷見真性如航度波浪雖不施喣嫗大慈莫過是是名為慈航莫作舟楫想又詩二首迷時只欲尋師度悟了原來自放船十里芰荷風景好一天星月水光鮮乘流搖曳無拘礙順勢開帆絶妄牽大衆此時齊到岸儂家把舵莫遷延底事推牛集萬人慈航一葉可通津秋空月皎江聲寂春雨潮平水色新作浪蛟龍休戀怪忘機鷗鳥自相親此心浩蕩無羈絆不記蘆花淺水濵狂夫解嘲狂夫學草聖奈爾心不定定不定圓中正咦看他凳腳入泥畢竟如此畢竟狂夫雜興平生適興多間話付與時人作浪猜一酌曹溪知水味白雲無意若為來梅雨翛翛潤氣蒸滿山新緑白雲凝小窗對客看書罷意外榴花照眼明示李得陽贈汝并州百鍊刀一刀削淨雜勞嘈內心無喘諸緣息贏得清間趣最髙示王居士凡修行人先要空諸業識業識既空即是菩提如何是菩提咄一刀兩段答沈原昭先生伻來重承厚意祗感之甚日前侍誨獲聆惟念阿彌陀佛求淨土之語卑末甚喜老翁晚年知歸結也但願舊日享富貴今日愛清淡與平生慈愛眷戀諸緣正念雜念一齊勘破不問九十年前九十年後并諸過去現在未來乾乾淨淨一個沈原昭不費阿彌陀佛半點氣力豈不快哉如以為未然更請於大慧書問內一鑽必得㘞地一聲此老昭然不昧又強如龜靈驗也又知阿彌陀佛同來一家者也豈特阿彌陀佛而已一切皆然卑未恃愛饒舌乞亮真情為幸書劉明善卷如是修學之人空諸業識內外如一邪正俱泯踐履境界得無上菩提實無所得如是如是文華藻思美則美矣謂之入佛階梯非吾所聞明善懇求直措如語之曰空諸業識來向上一步則在汝邊也贈惟修無作惟進修莫做作妙用工夫無絡索泥牛入水身不濕鐵蛇過海却褪殼生龜脫筒剎那間屠兒放刀成正覺好將無作本來心真實著腳無推托莫把上乘讓别人莫道魯鈍不肯學後輩狀元前輩稱向無撈摸處撈摸一拳打透水牛皮好箇龍興修無作贊仁靜堂像灑落情懷吟風詠月閙中得靜有何兜搭握手溪橋孰云遽别載瞻遺像惘然長憶靜堂安在空空寂寂贊復可宗長老可宗問我求法語石崇問丐子糴米吳儂結舌有何言昨朝新雨連天洗贈訇維那西霞寺維那已訇號震霆二十歲能默誦法華經一部於今四年矣衆皆異之以為宿緣所致我聞大雄世尊在靈山會上演説妙法當時大衆聞其一句一義信心解悟者悉證無上菩提况能備記一大會中真詮密義洞了洞徹者耶訇師便當於此法華經中念念相續如川流海注如日運月行不退不轉不遷不變戒定慧三法門一齊精進則衣帶寶珠不待求而自得普門妙觀無假借而大明故足甘露味者必無飢渴悟法雷音者何有驚疑略説如是尚勉進修偈曰鐵墻無縫須鑽透推到靈山不見蹤門外石人齊唱喏人間驀地出真龍金字金剛經卷後大雄世尊説三乘法開度羣迷一大藏教百千萬言敷演妙義接引諸根可謂至矣獨以金剛般若波羅蜜經接引上乘其故何也夫上乘之人自見自性無悟無迷又何待言語接之哉嘗聞蓮出汚泥故無俟於雨露而後清潔雨露之潤實有滋於蓮之光華烏號之弓能徹札矣必排擊以端之棠溪之金無礦滓矣必冶鍊以堅之故上乘之初拭也必假明師印正鈍根之漸熟也亦可説法以度生譬猶良驥之善走也欲適秦必西轅黃龍之善泛也欲度遼必東指繇是知世尊大慈必以金剛般若波羅蜜經接引上乘荷擔如來阿耨多羅三藐三菩提真實妙義以續慧命開導末世衆生源源不絶濟拔迷塗故以能為人演説金剛般若波羅蜜經則福德勝於以如須彌山七寶布施其故何也夫寶者不過莊嚴色相之具耳一旦四大幻空則其所寶盡入他人之室其又何所寶也其實不如能於四句偈中淨信悟明得吾本來面目去來無礙得大自在所謂如須彌山七寶於我何加焉信知如來不妄語也後人設金寫經者蓋以明經為重金為輕也如來又以法尚應捨何况非法又知身尚應捨何况於金如是經者説萬法空如是捨者證萬法空如空如捨即我性空性無相故性性不空故知金字經者莊嚴相也一念生淨信者實相無相也因莊嚴相生淨信心證明實相是故聞經悟道亦多人矣則經義廣博福德𢎞闡無量無邊非妄談也錢孔昭以金字般若波羅蜜經求豫轉語示此略議孔昭孔昭既能捨財續經必能一念以生淨信能求莊嚴以證實相又知聰明伶俐漢能以智慧篲淨掃腳根跳過金剛圈直造波若岸非虛語也尚勉之哉易齋集卷下
