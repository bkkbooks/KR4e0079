body:
  text: 易齋集卷上明劉璟撰詩五言古體張宜仲宅即席張公勸我酒坐待更鼓鳴談笑席方促僕夫催我行豈惟戀杯酌自是懷友生相逢不放意歲月空自驚况此苦寒地疇昔胡馬營吾儕夙多幸生世遭盛明秉筆事戎幕絃誦歌升平長踞佐竒畫亦足雄邊城聽斷實王略獻納非吾能晝驅校獵場夕講古壁經暇日或相過詩酒攄中情可為知已道難與俗子評顧此宜秉燭但恐河漢傾抗手暫相謝明當盍簮纓會稽姚節婦俞氏整我緑綺琴彈作孤鳯凰浮雲為我結白日為我黃姚氏有令婦義烈明秋霜盛年失所天感傷獨倣徨遺兒甫盈尺姑嫜老髙堂殺身赴黃泉置此誰扶將古人貴全孤念念焉能忘鞠養力既殫勞勞情靡極貧病煎我懷荼毒安可食重念貞節婦秉心金石堅金石有銷毁婦心無變遷奉姑盡孝養教子窮青編子兮善承志力行邁儒先業勤道自修應詔班朝賢榮身顯二母旌節其來宣矢詩示將來餘慶長綿綿葵陽軒為張紀善作紫鳯翔九霄衆鳥從之飛白日麗中天萬彚仰光輝傾心附陽德有美園中葵竒花發五色緑葉何萋萋君子秉至德尚友安可遺張公江海士道義腴而肥訓戎塞北地匹馬從驅馳寸心慕葵陽大椽懸軒楣所以頃刻次儼如對彤墀忠信有如此鐘鼎誠相宜願子厚自朂慰我清風詩推誠輔仁主千秋以為期雜興白日皎中庭風聲振簷鐸英英階下華繽紛隨風落弱質同荏苒風勢何飄薄南山有松柏一年長一尺十年枝幹成霰雪不能迫久要見人心貞脆在所擇垂綸軒白髮釣清渭有志期經綸羊裘坐苔石未足辭故人豈如衡茅下投竿餌修鱗名實兩不入足以全吾真漁歌竹枝晚水色桃花春白鷗亦解事蕩漾來相親雙燕雙燕並秋風雛成巢已空徘徊不忍去主人恩愛隆秋風一何急燕飛安所集奮趐起髙翔南山且棲蟄明年春風和還向雕梁立顧此興我懷浮生徒汲汲劉審理宅即事今宵去人哭明日居人歌行止有分定人生知幾何悠揚轉蓬根浩蕩西北風弱質任飄翻棲息何時終顧此增永嘆永嘆情靡極舉酒欲飲之持杯三太息有生同此懷幸會期無乖張燈厲絲竹我意君當諧譬彼天上月暫盈仍就缺念之動遐思憂心不遑掇憂心曷能已川流逝無止大觀亦齊物詎謂私一已題李蘇泣别圖丈夫秉壯志報國當及時父兄並顯列遊冶非吾為奮身胸奴庭仗節伸漢威羝羊豈能乳壯心終不移自分餧豺虎何意還京畿降王昔吾友話别增傷悲白日自西匿流波亦東馳人心豈能一街陌多交岐蕭蕭茂陵樹種種衝冠絲死生不相愧忠貞有前期念之感中懷朗詠飛龍詩張宜中小像琅玕出海底瀟灑脫塵俗若人貞特姿秀氣清可掬白鶴如小童遺經僅盈軸淡乎太古風可使薄夫肅月夜醉歌夜坐初未闌微醺為誰醒月華滿院落長空蕩秋影我歌懷古詩妙契心獨領冬裘復夏葛自樂無妄逞盤谷八詠雞山曉色何年天星下化此金雞峯峩冠聳危石翠羽森長松旋如展翎翅峙如決雌雄初瞰接曙色姿味多竒蹤雖無司晨唱晦明若先容誰將翬飛搆來此披蒙茸臨窗契玄理晤言懷宋宗龜峯春意振䇿陟龜峯極目散煩襟扳蘿越巘崿觀奇擁嶔岑氣和濯柔荑景淑悅鳴禽淡薄白日輝遊漾輕雲隂豫情亦何欲物理諒可尋芳菲三春意贔屭千年心持此較貞脆因之寄知音北塢松濤北塢邃且深山峻路迤邐松林積空翠靈闕盈耳忽疑風雨交溟渤驚濤起初喧或乍息翕繹互宫徴咸池激清波牙期聆流水鏗浤信竒音浩蕩絶塵涘長嘯列禦冦雲車奮髙軌西岡稼浪開軒臨西野禾稼盈我眸西岡度微風髙浪湧崇丘揚揚翠雲起滚滚清瀾浮雖無乘槎事恍若覩瀛洲大哉化育功沛然和澤周黍稌兩穫宜歲工期有秋含哺頌帝德長年樂無憂雙澗秋潭源深澗縈紆合流滙澄碧參差藻荇敷蕭散蒹葭闢雁來天宇清龍蟄暄氣寂濯纓枕長流刺齒潄幽石髙蹤躡前修邁志追疇昔心虛寵辱忘性達驕吝什浩歌樂餘間邈焉塵外迹三巒夜月太虗蕩無形夜靜境愈現開窗對三巒明月皎如練露華光灼爍衆緑鬱蔥蒨憩心暫徘徊飛光疾流箭悠悠大瀛海寂寂廣寒殿神仙邈已逺靈藥不可見桂樹秋風多使我心眷眷松磯釣石長松冠幽石坡陀成釣磯境間衆妙集地勝紅塵稀攜壺時一往埀綸泛漣漪得魚已忘釣對客應無機澄波碧天影緑隂西日暉一身淡無營萬鍾亦何為醉餘步山月明晨渡來嬉竹徑書齋良田遺子孫勤儉躬耒耜牙籖積髙架進修飾行止書窗竹徑中髙舉逺朝市皋比坐明師几席羅弟子清虛見真心靜默臻妙理濟濟青襟翔振振忠賢起竹花綴嘉實雛鳯徴斯美古意寄盧省菴吳廷圭昨夜起觀星北斗懸中天牛女隔河漢跬步不得前東方有一士披褐露兩肩積雪寒蓬廬中心常泰然髙歌商頌篇激烈浮雲旋士心亦何求長為知者憐妖蟇蝕明月玉川欲刳之惜無登天梯涕泗空漣洏哀哀卞和玉惻惻魯女葵桓侯諱其疾扁鵲乃見疑長嘯郭林宗髙風邈難追題髙先生畫竹憶昔江南時追涼隱篁竹靜觀生意妙息我塵外躅修幹質尚柔新葉隂始菉披衣撫寒玉逍遙散煩溽十年塞北遊夢想結心曲披圖忽見之瀟灑暢心目題詩謝客去言盡意未足髙公妙筆墨獨得造化先間將北窗意寫入雲華箋中庭白日靜重隂亦蹁躚赤霄舞孔翠閶闔來飛仙飄飄出塵態豈為凡纍牽斯人隔山嶽企望心茫然陳太初畫竹為叔端姪作危石湧坡陀菉竹秀其顛貞堅太古心蒼翠宜長年古人重依附今人自纒牽陳公古君子得意造化先揮灑有神助至今光彩鮮我來偶披閲却憶遊淇園武公不可作妙際無遺筌豈天不佑善地氣乃變遷感之再三嘆賴有斯圖傳願持寶愛之使比恂栗篇精心勵清操孫子其相延雲山圖為陳彥思主簿作我昔遊龍沙極目但荒磧回首青田山縹眇片雲隔承恩偶歸來真趣契疇昔故人有陳子吏隱曠塵迹示我雲山圖一洗煩慮滌雨餘新嵐生山濕翠欲滴茅茨無俗駕猿鶴驚朝夕扁舟何處來得非武陵客先生髙世心詎可凡態測長嘯滄浪心浩蕩情靡極寓軒浮雲處空山飄搖無定時人生如轉蓬聚散何能期涼風起天末光景東南馳誰知故鄉客良會江之湄軒窗一何淨髙栁青依依新醪散煩襟蟹螯亦復持醉臥光月白天宇浮漣漪雞鳴上馬去回首成凄其寓形復戀闕所愧達士知卓哉南華子千載真吾師謾興乾鵲堂前鳴西風過籬落粲粲黃金華含香為誰托白日光皎潔載籍滿髙閣顧此亦奚為長歌入寥廓偶來苕溪遊便作苕溪客尋得菊花栽開我窗前色我身亦何營景會心自適百年諒如此樂矣何所迫蕩蕩白日光照我窗前竹竹枝自瀟灑竹葉自鮮緑霜濃色不悴生意如可掬植物有若斯况乃昆山玉人生天地間諒非形所局茍能遂直道至樂恆自足贈松陽陳希曽先生接輿嘆鳯德宣尼感祥麟狂聖雖不同明哲俱全身達生貴無我和光混埃塵斯文茍不喪美璞終見珍泰運屬明聖彤庭布純仁髙岡賡鳴和深淵躍潛鱗子何固山澤不念蒼生屯願施素所蘊騎箕補星辰不然當大飲莫負頭上巾不作仙與佛不譽墓中人坦蕩宇宙間長與元氣親揮絃送鴻圖為族兄作中散不偶世養生以餐霞立言傲湯武有志追勛華龍性不茍狎鳳儀繇德姱揮絃送飛鴻遊意天之涯下視凡俗子曷啻􅀈與猳山陽一聲雷千載興我嗟故人抱貞操遺世如塵瑕披圖見真境言盡意逾賖小景千巖聳空翠萬壑爭飛流達人逺塵俗於焉搆危樓仗策有髙士同志寧相求拂桐操孤鸞知者竟千秋梅花屏詩贈均輔王頥齋江梅吐竒芬貞清歲寒色畫師為寫真識此心相得鳯尾拂寒玉龍鱗綻仙葩不有處士節詎入山人家江水不改色梅花發隆冬若識畫師意見此長年容知心不在色覽德豈在香持之贈故人故心如許長龍江送别圖為何彥博賦送客千里行酌以一杯水水清見真心長江浩無涘行子無定端飄泊詎能止昔時狼山道今來白鷺洲戎馬厭驅馳大舸良悠悠雲帆駕長風遡浪如安流安流發髙興洞視寰宇間中原莽榛棘天地何漫漫誰令封狼恣強弧弛其彎彎弧定有日勸子毋燕昵孝以報慈親忠當奉王室浩浩以醫國調理能事畢子今歸故鄉為我謁上清我願仙道盛不願鬼道興朂哉老祖烈毋使魔縱橫吾聞得仙士恬淡以延年早服重積德浩劫虛皇前子心已瀟灑應遇真師傳真詮貴冥搜洞悟絶塵迹火記一萬周白鶴載雙舄子其慎精鍊行綴瑶池籍七言古體天山行天山雪花大如席散灑穹廬作氷瓦白日照不破北風吹復垜行邊使者文皮裘馬足凌兢氷上遊僕夫苦寒步不進王程未敢為稽留天山戍士可奈何斧氷作糜行負戈雖無重裘禦寒凍此地幸喜豐嘉禾但願盛時烽火息將見年來足衣食咨詢民瘼使者事當得邊人時種植雞鳴山雞鳴山嶟峰峭壁何孱顔北風吹雪積不住猿狖罔敢來躋攀浮屠古剎踞其頂乃是人巧偷天慳洋河急流走其下石洞千佛藏其間我來正值嚴冬月祈寒作氷厚地裂却疑南國青蓮花漏趂回陽逞竒絶兹山壯麗雄邊州應有神靈護明滅憶昔唐宗曽駐蹕忽聽金雞催曉日邇來陡過七百年古往今來事非一事非一可奈何惟有名山長不磨登髙得句聊自慰葡萄滿注金叵羅送張紀善還越省親分題得居庸關居庸關南楊栁青居庸關北嚴霜零惟天設險限南北寒暄異候差難評長風揚沙聲震地行人駐馬傷心情我來守邉久寒暑風沙習慣無嫌憎聖神御宇時升平燕然不見烽火驚曵裾王門稱老生抒詞吐論芝蘭馨期與鄒馬爭先鳴張公清如玉壺氷春花秋實二美并殷彛周鼎置宗廟天球河圖羅大廷至寶得所乃為貴公今地位宜成名與公同看天宫榜於今六載趨承明久要愈見心似鐵不為夷險逾堅貞男兒忠孝若輗軏失一不可馳周行近來謁許省闕西行李催歸程故鄉晝錦人所榮髙堂壽母猶康寧宦遊如此誠稱意君恩較重丘山輕送公居庸關下路賦詩愧我參羣英行當及早趨幕府謀謨庶務期經營送盧省菴還天台省親分題得黃金臺黃金臺何峥嶸一時事業千秋名燕昭發憤雪讎恥築臺堆金致賢士當年豪傑非一人樂生獨步凌青雲廟謨已定義師出電掃齊城不終日恥已雪功埀成君王忽逐神仙行後王信間輕易置樂君納履全髙義三軍解體從此始荒臺寂寞秋風起我今送行人過此金臺下懷古復長思持杯仍駐馬駐馬送君歌我詩羡君才學尤清竒推誠輔主當及時銘功鐘鼎誠所宜如何遽作晝錦歸髙堂有母白髮埀主恩賜告得時省絶勝望雲增懷悲送君去期君來籠中藥物不可缺北轅早趂賔鴻回黃金臺亘長空君臣契合今古同經綸濟世須實學丈夫當慕真英雄訪皇甫廷玉不遇相遇仍論不相識知心只在心相得白鷗浩蕩誰能馴達生不羈忘要津應龍天飛威鳯霄翔犗餌不能致罻羅詎能張拂我梧桐調我氷絲與君歌作陽春曲孤雲為我徘徊飛湖波不驚淡寒日時聞妙香滿虛室喬松積翠老貞姿芳蘭含情媚幽質心懷君兮君不歸君出門理棹搖斜暉明朝倘遂相思意遲君只在華溪湄錢王箭頭鴟夷作忠心不遂噓氣聲濤震天地蛟龍逞欲乘其時鼓濤奮浪隨風飛蒼生為魚都不顧莫去朝來恣狂怒後來壯士心不平擴弩括機神鬼驚飛矢一落江海寧乾坤闔闢四百年靈物不朽長貞堅古稱精誠貫金石捍患庇民真偉績丈夫作事不虛擲結襪子貧賤可肆志富貴難驕人君不見昔周文武稱明君俯身釋旄今古聞貔貅同心勇如雲戎衣耆定天命新又不見釋之長跪奉王生子房圯橋功業成聖賢豪傑事如此禮義結人同一軌長平戈頭君不見馬服君一朝東向朝三軍黃金市買好田地心豪氣溢雄如神四十萬人竟葅醢殘坑今有戈頭在龍鱗蛇文土花剝鋒利猶堪解盤錯想當前輩爭北山爾戈曽得揮其間解圍却敵如等間功成為龍事僨為魚只在將軍心卷舒一人自智萬人箝口羣䇿驅馳竟何有智謀完士牛隨後嗚呼爾戈更入何人手贈張才仲君不見江東王謝家子弟骨格風流皆濟濟流風遺俗傳至今故家文物衆所欽會稽名山神禹迹東山蘭亭聲藉藉英芝家世襲忠貞兒孫文雅長相承葵陽病翁稱老拙才仲猶孫更清徹氷壺玉露殊森爽清廟朱絃應疏越我一見之心則悅酌以清酒誨以説亹亹聽我謙罄折知其中平無妄蹶他時叔長必登闕願無自滿更磋切著鞭奮迅追前轍贈言有盡意未輟送戎醫玉液子徐文顯還檇李平生報恩劍三尺斷骨絶咽難更索要覓仙人不死方滌腸浣胃續筋脈求之不得中心焦遍訪蓬萊海波隔徐生家世習軒岐方術流傳著今昔能將折肱作完臂更使殘支成好骼操持運用還本初榮衛流通肌肉懌仁王鎮邊經百戰置之幕下防肘腋軍中纍見收竒功刀瘢箭痕隨手白有卒修城頺石格股骨如糜肉如磔仁王命生返其魂如牆觀者皆辟易生舒其筋按其折付以良藥束以帛夾以薄板如簡册飲以神劑瓊玉液三日精魂乃安宅將軍墜馬臂如擘役夫當車闕迹但逢徐生皆脫厄往往效驗難具述曩時大將平姑蘇已聞妙手聲烜赫壯士冒力衝強敵斫脛傷喉陷胸臆長創洞中連弩射銃筒噴彈飛炮石碎首流腸鏖擊刺氣息略續皆可繹不使英雄命虛擲瀝血毁膚或青赤立使平復無咄唶范增怒發疽背迫荀偃中軍頭若瘍仲由結纓能正色倘若遇生可無踣或云方技難逺績小道恐泥誠下䇿吾聞聖人至仁澤昆蟲草木猶愛惜癰疽瘠環行或逆宣尼於藝諒靡責不然牛醫之兒與劍客安得升堂衣逢掖徐生髙藝真竒特安常守分心自適僻居逺人人不識立身端謹衆所擇仁王至恩深且奭俾歸故鄉悅親戚濟人為心可醫國重之不異連城璧梅花羅浮山人絶塵俗晴曦映戶香寒玉澄江淺浸珊瑚柯翠禽啼處陽和多長空無雲露天骨滿眼紅光消積雪錦囊索句招香魂暗逐神飈度明滅縞衣素袂乘玄氷人間何處來飛瓊紅粧偶被壽陽汚白質獨契逋仙情廣平貞操天下重蜂蝶無緣得矜寵孤髙丰度非凡種對君清思如泉湧栁隂祖帳都門楊栁埀青隂祖帳送行傷客心黃鸝愁醉别情苦白鳥鳴嘶離思深欲把長條繫春色飛光如梭真可惜臨岐莫折楊栁枝留取待君君早歸花底雜歌江城雨後花蒙茸離筵一曲情正濃氷絲戞桐泣孤鳯流徴激楚隨飛龍悠悠車馬秦淮道多少殘紅委芳草行人覲省須早歸君親恩義難兩違風亭别袂春風送客皋亭下話别殷勤袂寧把别情苦多前路長東西抗手髙翺翔何以贈子金玉章惓惓思心實難忘勉旃令望遵周行舌柔齒脆慎行藏關山春色關山春色濃於酒逺客思家日應久那堪此際送歸人腸斷河陽折楊栁送君歸君今早去參庭闈生前一日直千日無使日後徒沾衣畫梅華幻住髙僧在天目賦得梅花鬼神服至今詩句流人間探幽討賾無時間能畫才人湯叔雅又把花神重摹寫梅花本是無心物剛被渠儂衒真假畫中之花無四時壁間一見尤清竒忽驚一月隂山雪莫與西湖處士知羅浮山中雪三尺梅花倒埀龍尾枝髙人一見動清興精神入筆珠陸離明窗展玩當晴曦宛疑四壁生涼颸羡君博雅好古談能使朽腐為神奇神馬圖矯矯神駿天下稀丰格拔萃尤充肥奚官牧放順天性騰躍不受靮與羈一朝良造思控馭命駕千里雷霆飛何年深宫萬幾暇尺素模寫侔天機何不寫岐陽比物齊四驪憲章文武張綱維又不寫臨淮破賊中灘下呵叱鐡騎摧長圍帝王所尚在逺略屑屑形似將奚為吾皇聖神馭寰宇討論治道無娛嬉梯航萬國盡臣服獨放梟騎隂山陲謀臣猛將欲奮擊皇仁未忍蒼生疲天間龍種幾千萬蕃息郡縣連郊畿願選此類數萬匹掃取遺裔成功歸漠北無復煙塵飛一勞永逸蘇瘡痍種竹齋琅玕出海底枝葉何扶疏徑節貫氷雪秀色凌雲衢美人愛之不能捨劚根封植當庭隅嘉實須期待鸞鳯長竿直欲釣鯨魚門無俗客書几間清風環珮聲珊珊令人脫凡骨神遊入玄關蓬萊只咫尺誰謂難躋攀虗心可以通妙道正氣自足超塵寰葛陂變化良非難畫竹為禮部陳景祺作君不見文湖州長梢萬尺寒颼颼龍蛇入筆走風雨墨𣲖從此開源流髙公近學丹丘老幾根拂雲清更好珊瑚扶踈石上生琅玕戞風硜有聲靈物特達不阿附肯與百草同衰榮陳郎取尚良有徴秉節不移誠可矜嵗寒永結貞忠盟題雲山圖君不見米南宫天下名父子貌得瀟湘晴雲暗雨千態萬狀清絶竒當時尤物重連璧髙人名士往往爭致之或將模寫廣清玩繇此真贋來羣疑此圖何人所臨拓筆意精研若神合山巃從兮雲溶溶其下若有藏蛟龍深林雜樹蔽虧隱茅屋得非避世之士於此潛其蹤扁舟逺在橫橋東沙頭艤棹空秋風飛雲凛凛凋青楓皋蘭歇芳兮桂離其叢王孫不歸兮感豫衷滔滔逝者無終窮雲陽九疑何濛濛攄中情兮附飛鴻思王孫兮我心沖沖贈駱指揮畫馬駱將軍貌得天馬無比倫雙瞳熖爍四蹄疾踏破沙漠千重雲只今暫向江南去飛控天衢躡香霧回頭北掃邊塵空䇿勛獨對明光宫抱琴待渡歌莫唱斑竹枝莫歌武溪深欲渡未渡停我琴縱情對語兮相知心泛安流兮輕舟春山積翠兮連樛留同氣兮相求吾與君兮優遊門有車馬客行送董都事起復門有車馬客言自雲中來朔風吹雪送秋雁白楊東下單于臺雁門之關何壯哉樓煩石嶺髙崔巍董君文武之長才雄藩書諾稱竒材偶丁內艱歸故里終制三年猶撚指風雲又作從龍起騏驥終當致千里男兒有䇿須濟時定應前席陳謀為奮身立功報明主廟堂制勝須投機好懸金印大如斗分茅仍望家山歸臨河送别金屈巵南風錦帆去如飛月浦歸帆水宿周回厭辛苦五兩而今到南浦平波映月攤玻璃家山只在山之湄早知可望不可