雲逺俗只宜尋鳯友可人應自出雞羣有時刷羽髙松頂不把空拳解世紛甘露寺多景樓南連吳會北維揚俯瞰江流萬里長甘露舊從天上落慶雲時傍日邊翔鶯啼淑景園花媚龍蟄清秋海氣涼前代英雄籌䇿處至今人事幾興亡焦山寺焦公煉丹丹已成飛劍直斬石公精名山便作佛世界廟食猶顯神英靈浮玉峰前蒼隼集吸江亭下碧濤平花開花謝誰為主潮去潮來似有情石門洞洞天山水最清竒架壑連巖結構危石徑雲深荒蔓草野林霜䁱熟棠梨入山却下聽猿淚看瀑長吟謝客詩夜宿羣峰最髙處俯看星宿列珠璣梅花不隨桃李弄精神獨抱孤髙意更真玉骨氷肌姑射子錦心繡口謫仙人平安歲月宜交友恬淡風光度劫塵昨夜南枝初爆蕊雪中爭道見陽春子建當年賦洛神一時邂逅未為真若知江上芳心客豈慕巖阿豔質人月冷香魂常入幕天寒羅襪不生塵建安風骨多豪俊可惜無詩咏此春試問江干老樹神寒花何事獨純真詩仙去後無賔侣禪友歸來有主人道向雪霜修白業曽於劫火脫紅塵月中世界如銀色誰解清香帶得春夜泊長洲見水神不修嬌媚任天真香飄老樹風驚鶴影入清江月近人詩思若泉無雜慮虗明如練絶纎塵羅浮可到滄溟濶料想應同此地春玉蕊含章妙入神雪中誰得似渠真擔頭歸計功成將牆角生涯遁世人青子作酸調鼎實素娥凝笑却粧塵羅浮風景都休話最愛三冬一味春瀟湘江上雪中神徑節寒花趣最真守志漢宫辭輦客報恩湘水泣珠人瑶琴調轉關山月羌笛聲催車馬塵清境皎然無滓翳誰能識破此時春江上梅花玉雪神移栽山舍伴清真不惟徑節陪殘歲更有新香送故人玉堂學士才如海天目髙僧妙脫塵試折一枝相問訊百篇髙興不勝春一聲玉笛暗傷神忽憶家山思倍真塞北絶無同調客江南多有賞音人碧窗含影來寒月繡閣浮香和暖塵今日重遊歌舞地剩簮芳蕊為迎春幹如精鐵老猶神獨秀江干勝玉真香綻寒枝驚木客珠生枯枿駭鮫人霜威未遂金笳調陽氣初吹玉管塵殘臘尚留芳意在剩簮銀燭照和春靚粧髙髻不為神綽約仙姿自在真歲晚長江無鳯侣天寒空谷有佳人清香度水月籠影闕蕚委堤風送塵新葉漸抽青實小人間正是艷陽春雞鳴山用前韻雞鳴山勢壯邊州鐘梵荒臺在上頭獨石下藏千佛洞羣峰中見兩河流路有碑隂題漢字橋無閣道度梁輈登臨不用增惆悵古往今來總一漚三歸臺一自西郊嘆黍離下堂交質事尤非射鈎既釋當時忿定霸應為萬世師海宇未馴周典則江黃又見楚旌旗可憐匡世經綸手寧是偷安脈禍機水仙花婀娜仙姿江漢阿宛疑月殿下嫦娥翠翹弄影天風細玉質浮香雨露多交甫褰裳承委佩思王按轡賦凌波歲寒無愧盟三友擊節抒情為爾歌五七言絶句蘆雁鴻雁飛時塞草秋風沙颯颯使人愁因君為報江南信蘇武天山雪滿頭天目山前粳稻秋西風歸雁影悠悠月明何處雲羅逺浩蕩湖波水滿洲小景扇面翠老雙松楓葉紅釣絲搖曵半江風雲山萬疊歸程穩莫使羊裘入畫中畫葡萄忽疑前夜風雨急蒼蒼亂木蟠虬龍枯藤老骨化不去絡索倒埀煙露空葡萄子熟邊草秋葡萄酒熟雪成毬將軍爛醉氍毺月士卒驚寒入敝裘題竹誰將天上琅玕樹栽向連灣緑水湄歲晚江空鸞鳯逺白雲幽石自相宜瀟灑含風玉數莖若何偏向石間生貞心諒有夷齊識耐慣氷霜老更青幽石桃花間竹栁埀隂獨坐茅亭嘯玉琴紫鳯翺翔碧霄外人間何必有知音冉冉征途自不間雲飛鳥倦亦知還何如蓬蓽韜光者放浪形骸宇宙間寄題西湖西湖物色四時春羅綺香風伴醉人莫向登臨重回首六橋西畔更傷神荔枝圖海青使臣馳驛傳晝夜能行一千里誰想驪妃歡笑中黍離悲歌已盈耳墨菊柴桑處士多佳致種得幽花滿石壇月轉南山秋夜寂蹁躚玄鶴舞􅀈岏石邉老樹帶霜枝黃菊褵褷竹葉稀看盡却思彭澤令清髙不為歲寒移夢校獵生平常慕肉飛仙馬上論文佩兩鞬昨夜夢成孤枕上滿忩明月思蘧然臨清軒漁翁結屋此江干緑樹隂濃白晝寒滿目雲山詩思濶入鈎魚鯉酒懷寬東阡西風歸雁兩悠悠雲白江空萬里秋天目山前粳稻熟柴桑籬下菊花稠偶成先生未遂剡溪遊長想鵝湖泛小舟此日秋風歸興發濯纓埀釣思悠悠題畫山水樓閣連甍鎖翠微白雲容與翳忩扉懸崖瀑水自今古笑問何人解息機山水扇面為道會劉志澄題清溪道士神仙侣獨究羲文先後天玄鶴一聲雲縹眇滿林松影落階前松鶴圖神仙騏驥解飛鳴獨立松巔刷羽翎愧我承恩老山野九皋清唳月中聽小翎毛長夏沉沉緑樹隂偶來棲息一珍禽氷絃寫得忘機操應是髙人識此心淇園春霽駐馬淇園春正濃三山雲外聳芙蓉武公去後琅玕少霽色漪漪入畫中送張南賓還會稽越吟羇客久思家鞍馬西風别路賖歸到故園行樂處逢人應自説龍沙河梁分手客還家秋水淹淹去泛槎萬里關山鴻雁影三吳雲水白蘋花半崕秋水圖卷石巉巖蘸緑波結盤古樹挂藤蘿披圖起我還鄉興更欲乘風發棹歌雪山小景幾架茅茨蔽風雨萬重巖壑老雲煙開門長日無間事未必招提却是禪狂夫雜興夜雨垂簷共燭光十年湖海思茫茫誰知一醉忘形外究竟狂夫到底狂不著虛空不染塵無能無事養間身開窗坐對門前樹一雨經時緑意新題蘭佳人愛寫湘妃佩千載猶凝翰墨香昨夜春風透幽谷懸崖髙處意偏長倒垂梅姑射仙人玉雪裳騎龍飛下白雲鄉逋翁老去孤山冷千載西湖水色香紅梅羅浮仙子住江皋醉把胭脂染素袍昨夜雲旗降王母錯疑千樹熟蟠桃碧虛清趣白澗含清光宴坐夜方寂起視天宇寬月明露花滴長明宇宙間萬慮我何有充飢首陽薇適興柴桑酒題蘭我行采幽蘭棘針挂我衣呼童剪繁穢兩袖懷芳菲卷石何崔嵬幽蘭自有芳因兹筆端好重上君子堂膝王閣帝子去已久樓閣何峥嶸只見丹青景不聞歌吹聲題蘭幽蘭蘊竒芬緑竹秀空碧歲晏將如何君子介如石幽谷長芳蕙山林棲道心獨有髙世士可以為知音暮雲春樹雲林積空翠茅屋興悠然不來車馬塵獨聽飛崕泉小米小景踈峰矗蒼笋密林成翠幄髙人在深處何以尋芳躅採芝青溪濵釣魚青溪水不慕磻溪名莫洗潁川耳賦千秋辭應教賦甘雨兮清塵南風兮斯薰瞻鳯闕兮祥雲帝子降兮兹辰拜趨虔恭兮地逺情親膝下承歡兮喜慶同臻蹈舞兮羣臣秉心兮貞純翔有鳯兮遊有麟普天均覆兮皇之仁維藩維屏兮其始自君盛德兮振振子孫繩繩兮千秋萬春自莎堤送張宜中盧省菴至栁巷復賦以贈翩翩兮飛鳶洋洋兮潛魚諒人生兮有情能不懷乎故居噫若人兮美且都被青霞兮佩瓊華長鋏兮無家故鄉渺渺兮越與吳感返哺兮慈烏北堂有萱兮菽水靡俱駸駸兮青驪謁告兮歸期祖帳兮都門我心兮愁思河水兮淪漪浮雲兮孤飛與子别兮吾能不悲緑綺兮孤桐彈雅音兮歌南風山川迢迢兮思難窮望旋斾兮歸鴻骨肉斯文兮惟余汝同夙言還兮毋使我心忡忡述懷賦大道夷其如砥兮民狙詐而多端鄙騶虞之囓枯兮慕鷹隼之貪殘迂夷齊之節義兮尚羿莽之權姦雲靉靉其蔽日兮水泛泛其滔天民濈濈而為魚兮孰能極其憂患嗟禹功其誰繼兮豈不在乎聖神令宇宙之重開兮使斯民之咸仁馳騏驥而抗䇿兮顧及君之後塵時循環其踰邁兮吾獨惜夫陽春憩豫駕兮平皋濯豫足兮河津顧狹邪之不可陟兮將俟君之睿聞進何敢以貪榮兮冀方寸之有濟退不求夫偷安兮抱仁義之昭晰諒天道之有常兮窮逹繇其所形歷坎困而心亨兮處隨豫而能貞修闕一以寡過兮羌居易而俟命無驕吝其何憂兮聊從容以養生雲深書屋為劉翼南作山盤桓兮入杳冥雲濛密兮仰不見日與星猿狖攀林以呌嘯兮虎豹踞谷而紛爭若人胡為兮處此意氣間逸神如氷書插架兮萬軸屋架巖兮數楹採隂陽之祕賾兮掇邃古之羣英躋層巔以暇日兮聊嘯歌而抒情歌曰鬱彼平林兮百卉生之柔柔有鳥懷春兮遷喬出幽白日出之悠悠焱西馳兮羌不我留適宇宙之開泰兮拔茅茹以髙舉考制度於春官兮遵伯夷之餘矩命或乖於所逢兮施或待於有時諒蘩藻之鮮潔兮豈清廟之可遺庸玉汝以增益兮將好修而置之行藏安夫天命兮信中正之可期望雲亭為黃别駕賦士生兮懸弧誰復懷乎故都少學壯仕兮顯親揚名仕不遂兮親何以榮曰既仕兮慕君居官有程兮遺我親竭心奉公兮甘旨靡遑朝思暮懷兮曷云能忘岵屺可陟兮白雲可望安得致我兮親之傍白雲兮依依倐而東兮忽而西嗟我兮人噫獨不得與雲兮俱飛朝隮公堂兮暮趨庭幃有願不遂兮望白雲而孤飛畫水仙花若有人兮在沅湘金英玉質含清香翠雲衣兮佩琳琅我欲致之道路長江波滔滔兮葦不可航斷縑寫之懸髙堂天機奧妙歸毫茫凌波微步來銀潢洛神陽臺誠渺茫風木軒為吳典儀作山有木兮茂以青風以撓兮不安其生繄孝子之欲養其親兮時冉冉不待其榮山有木兮茂以豐孝子之心兮焉窮歲月駛而親不可待兮譬彼木之遭乎烈風宇宙兮悠悠人生兮好修我有父母兮不我久留萬鍾千駟兮適增我尤欲竭忠兮有君欲致孝兮何以求吾親必不得已兮惟修吾身維忠維信兮致孝道於我君思貽親兮令聞題三香圖山礬花兮幽蘭菲菲水仙冬榮兮瓊珮葳蕤異根同氣兮何必一時諒千古之契心翳或似之王孫去兮孰已知歲聿暮兮芳馨自持三者一心兮聊樂我私白日出之遲遲瀟湘水兮漣漪豈不鬱陶而遐思路﨑嶇兮難徑馳信君子之操兮金玉其儀審厥象兮玩以怡固明哲之所為賦雲山圖白雲悠悠兮羣山巑岏長江浩蕩流其間何人獨坐茅亭下却與真境相盤桓畫師偏能識天巧貌入氷紈極幽渺鴻濛太古長不老誰云女媧鍊石解補天使一見之驚絶倒山深深兮雲茫茫美人何為在他方金華仙都只咫尺拂衣便可髙翺翔呌初平兮起石羊尋赤松兮覲軒皇躋鼎湖兮挾飛龍翊元氣兮撫星芒過河鼓兮昭七襄謁紫微兮正天罡驂麒麟兮翳鳯凰歆羡攝伏兮神明孔彰順思慮兮保厥臧披圖一曲歌慨慷書以識之俾勿忘琴操閲耕操雞鳴孶孶將善是為而奚可以為本之不圖孰為我資整我鉏犁率彼東災翳我人斯毋從危機我黍與與我稷彧彧置之不顧曷其有熟相彼壟畝稂莠實多我薅我耘勞如之何稂莠薅止黍稷茂止翳我人斯厥惟好止相我黍稷其實蓁蓁厥惟好之育我斯人視我衣冠率彼王制禮義在心惟我斯繫凡民有生食以為天禮義勿繇曷惟永年天降斯典以序我人翳食是活如何弗勤彼火斯燎手可以撲原隰既炎江海弗沃凡我人斯擇術惟微始焉弗慎噬臍何其駟馬輕裘匪道弗繇勤我稼穡人誰我尤山有髙岡水有滄浪翳我人斯我循我常寫情操日月逾邁悠悠我思心之憂矣曷云能來陽鳥于飛肅肅其行終鮮兄弟能不慨傷陽鳥于飛集彼南陲我無羽翰力不能追蠶月條桑候雁北歸悵焉懷斯曷云其羈斾旌悠悠我心幽憂逝彼江波孰回其流滔滔江漢朝宗于海曄曄園葵旭日斯待葵生萋萋企彼太陽孰不令德而有耿光相彼嵩髙有博其址君子於學曷云其已駑馬千駕齊彼驊騮自愧蹇劣勉矣進修畫龍九五正中翺翔在天厥施斯溥復歸于淵畫菜肉食者鄙焉能逺猷灌畦有智其斯之儔畫瓜綿綿其瓞煜煜其實東鄰布衣可與入室易齋集卷上
